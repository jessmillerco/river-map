<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The River Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bone: #EBE0D1;
      --olive: #323D27;
      --cosmos: #461420;
      --moss: #7D774F;
      --white: #FFFFFF;
      --border: #D2C8BB;
      --gold: #DAAD44;
      --coral: #E87580;
      --blue: #7293C5;
      --champagne: #E6C3AC;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bone);
      color: var(--olive);
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
    }

    h1, h2, h3, h4 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      line-height: 1.2;
    }

    .site-header {
      padding: 40px 24px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .site-header h1 {
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      color: var(--cosmos);
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .site-header p {
      font-size: 1rem;
      color: var(--moss);
      max-width: 600px;
      margin: 0 auto;
      font-weight: 300;
    }

    .main {
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .section-block {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 36px;
      margin-bottom: 28px;
    }

    .section-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: var(--cosmos);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .section-number {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--moss);
      margin-bottom: 6px;
    }

    .embedded-prompts {
      margin: 14px 0 12px;
      padding: 14px 16px;
      background: var(--bone);
      border-left: 2px solid var(--champagne);
      border-radius: 0 2px 2px 0;
    }

    .embedded-prompts p {
      font-size: 0.875rem;
      color: var(--moss);
      margin-bottom: 6px;
      font-weight: 300;
    }

    .embedded-prompts p:last-child { margin-bottom: 0; }

    .embedded-prompts p::before {
      content: '— ';
      color: var(--champagne);
      font-weight: 400;
    }

    .field-instruction {
      font-size: 0.8rem;
      color: var(--moss);
      margin-top: 10px;
      font-style: italic;
    }

    textarea, input[type="text"] {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem;
      color: var(--olive);
      background: var(--bone);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px 16px;
      resize: vertical;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      line-height: 1.6;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: var(--moss);
      box-shadow: 0 0 0 2px rgba(125,119,79,0.12);
    }

    textarea::placeholder, input[type="text"]::placeholder {
      color: var(--border);
      font-style: italic;
    }

    .stones-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stone-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .stone-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--moss);
      padding-top: 14px;
      flex-shrink: 0;
      width: 24px;
      text-align: right;
    }

    .stone-row input {
      flex: 1;
    }

    .remove-stone-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--border);
      font-size: 1.1rem;
      padding: 12px 4px;
      transition: color 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }

    .remove-stone-btn:hover { color: var(--coral); }

    .add-stone-btn {
      background: none;
      border: 1px dashed var(--border);
      border-radius: 3px;
      color: var(--moss);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      padding: 10px 20px;
      margin-top: 8px;
      transition: all 0.15s;
      width: 100%;
    }

    .add-stone-btn:hover {
      border-color: var(--moss);
      background: rgba(125,119,79,0.05);
    }

    .analyse-btn {
      display: block;
      width: 100%;
      background: var(--cosmos);
      color: var(--bone);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      border: none;
      border-radius: 4px;
      padding: 20px 32px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .analyse-btn:hover:not(:disabled) {
      background: #5a1a29;
    }

    .analyse-btn:disabled {
      background: var(--border);
      color: var(--moss);
      cursor: not-allowed;
    }

    .inline-error {
      background: rgba(232,117,128,0.1);
      border: 1px solid rgba(232,117,128,0.3);
      border-radius: 3px;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: var(--cosmos);
      margin-top: 16px;
    }

    .loading-state {
      text-align: center;
      padding: 64px 24px;
    }

    .loading-state .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--cosmos);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: var(--cosmos);
      margin-bottom: 8px;
    }

    .loading-state p {
      color: var(--moss);
      font-size: 0.9rem;
      font-style: italic;
    }

    /* Results */
    .results {
      margin-top: 48px;
    }

    .results-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--cosmos);
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .result-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px 32px;
      margin-bottom: 20px;
    }

    .result-card.overall {
      border-left: 4px solid var(--cosmos);
    }

    .result-card-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--moss);
      margin-bottom: 12px;
    }

    .result-card h3 {
      font-size: 1.3rem;
      color: var(--cosmos);
      margin-bottom: 12px;
    }

    .result-card p {
      font-size: 0.9375rem;
      color: var(--olive);
      line-height: 1.7;
    }

    .feedback-text {
      font-size: 0.9375rem;
      color: var(--olive);
      margin-bottom: 14px;
      line-height: 1.7;
    }

    .expert-traps-card {
      border-left: 4px solid var(--coral);
    }

    .expert-trap-item {
      background: rgba(232,117,128,0.1);
      border-radius: 3px;
      padding: 12px 16px;
      margin-bottom: 10px;
      font-size: 0.875rem;
      color: var(--olive);
      line-height: 1.6;
    }

    .expert-trap-item:last-child { margin-bottom: 0; }

    .no-expert-traps {
      background: rgba(125,119,79,0.1);
      border-radius: 3px;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: var(--moss);
    }

    /* Suggested river map */
    .river-map-doc {
      margin-bottom: 20px;
    }

    .river-map-doc-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      color: var(--cosmos);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .offer-promise-block {
      background: var(--olive);
      border-radius: 4px;
      padding: 24px 28px;
      margin-bottom: 20px;
    }

    .offer-promise-block .result-card-label {
      color: rgba(235,224,209,0.6);
    }

    .offer-promise-block p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      color: var(--bone);
      line-height: 1.6;
      font-weight: 400;
    }

    .bank-section {
      margin-bottom: 20px;
    }

    .bank-section-heading {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .bank-section-heading.cosmos { color: var(--cosmos); }
    .bank-section-heading.blue { color: var(--blue); }

    .subsection-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
      margin-bottom: 10px;
    }

    .subsection-card.cosmos-border { border-left: 4px solid var(--cosmos); }
    .subsection-card.blue-border { border-left: 4px solid var(--blue); }

    .subsection-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--moss);
      margin-bottom: 10px;
    }

    .subsection-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .subsection-list li {
      font-size: 0.9375rem;
      color: var(--olive);
      line-height: 1.7;
      padding: 4px 0;
      border-bottom: 1px solid rgba(210,200,187,0.4);
    }

    .subsection-list li:last-child { border-bottom: none; }

    .core-problem-text {
      font-size: 0.9375rem;
      color: var(--olive);
      line-height: 1.7;
      font-style: italic;
    }

    .stones-result-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .stone-result-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }

    .stone-result-row:last-child { border-bottom: none; }

    .stone-result-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--moss);
      flex-shrink: 0;
      width: 20px;
      padding-top: 2px;
      text-align: right;
    }

    .stone-result-content {
      flex: 1;
    }

    .stone-result-belief {
      font-size: 0.9375rem;
      color: var(--olive);
      line-height: 1.65;
    }

    .stone-result-note {
      font-size: 0.8rem;
      color: var(--moss);
      line-height: 1.5;
      margin-top: 6px;
      font-style: italic;
    }

    .retry-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--moss);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      padding: 10px 20px;
      margin-top: 12px;
      transition: all 0.15s;
    }

    .retry-btn:hover {
      border-color: var(--cosmos);
      color: var(--cosmos);
    }

    .error-card {
      background: rgba(232,117,128,0.08);
      border: 1px solid rgba(232,117,128,0.25);
      border-radius: 4px;
      padding: 28px 32px;
      text-align: center;
      margin-top: 32px;
    }

    .error-card p {
      color: var(--cosmos);
      margin-bottom: 8px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }

    .site-footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--moss);
    }

    .site-footer a {
      color: var(--moss);
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .section-block { padding: 24px 20px; }
      .result-card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef } = React;

    const STORAGE_KEY = 'rivermap_v1';

    function loadSaved() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch {}
      return null;
    }

    function saveToDisk(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch {}
    }

    function SubsectionCard({ label, items, borderClass }) {
      if (!items || items.length === 0) return null;
      return (
        <div className={`subsection-card ${borderClass}`}>
          <div className="subsection-label">{label}</div>
          <ul className="subsection-list">
            {items.map((item, i) => <li key={i}>{item}</li>)}
          </ul>
        </div>
      );
    }

    function Results({ data, onReset }) {
      const map = data.suggestedRiverMap || {};
      const tb = map.thisBank || {};
      const ob = map.otherBank || {};

      return (
        <div className="results">
          <h2 className="results-heading">Your river map — analysed and rewritten</h2>

          {/* Section 1 — Overall read */}
          <div className="result-card overall">
            <div className="result-card-label">Overall read</div>
            <p>{data.overallRead}</p>
          </div>

          {/* Section 2 — Expert trap flags */}
          <div className="result-card expert-traps-card">
            <div className="result-card-label">Expert trap flags</div>
            <h3>Are you speaking from the other bank?</h3>
            {data.expertTrapFlags && data.expertTrapFlags.length > 0 ? (
              data.expertTrapFlags.map((flag, i) => (
                <div key={i} className="expert-trap-item">
                  <strong style={{ display: 'block', marginBottom: '4px' }}>{flag.phrase}</strong>
                  {flag.why}
                </div>
              ))
            ) : (
              <div className="no-expert-traps">No expert traps detected — your language stays on this bank throughout.</div>
            )}
          </div>

          {/* Section 3 — Suggested river map */}
          {map.offerPromise && (
            <div className="river-map-doc">
              <h3 className="river-map-doc-heading">Your rewritten river map</h3>

              {/* Offer promise */}
              <div className="offer-promise-block">
                <div className="result-card-label">Offer promise</div>
                <p>{map.offerPromise}</p>
              </div>

              {/* This bank */}
              <div className="bank-section">
                <div className="bank-section-heading cosmos">This bank — who your cold person is right now</div>
                <SubsectionCard label="What they believe" items={tb.beliefs} borderClass="cosmos-border" />
                <SubsectionCard label="How they see themselves" items={tb.selfImage} borderClass="cosmos-border" />
                {tb.coreProblem && (
                  <div className="subsection-card cosmos-border">
                    <div className="subsection-label">Their core problem</div>
                    <p className="core-problem-text">{tb.coreProblem}</p>
                  </div>
                )}
                <SubsectionCard label="How this shows up in their day" items={tb.dailyExperience} borderClass="cosmos-border" />
              </div>

              {/* Stepping stones */}
              {map.steppingStones && map.steppingStones.length > 0 && (
                <div className="bank-section">
                  <div className="bank-section-heading cosmos">Stepping stones — the belief journey</div>
                  <div className="stones-result-list">
                    {map.steppingStones.map((stone, i) => (
                      <div key={i} className="stone-result-row">
                        <span className="stone-result-num">{stone.num || i + 1}</span>
                        <div className="stone-result-content">
                          <div className="stone-result-belief">{stone.belief}</div>
                          {stone.note && <div className="stone-result-note">{stone.note}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Other bank */}
              <div className="bank-section">
                <div className="bank-section-heading blue">The other bank — after working with you</div>
                <SubsectionCard label="What they now believe" items={ob.beliefs} borderClass="blue-border" />
                <SubsectionCard label="How they now see themselves" items={ob.selfImage} borderClass="blue-border" />
                <SubsectionCard label="What they have that they didn't have before" items={ob.whatTheyHave} borderClass="blue-border" />
                <SubsectionCard label="What looks different in their day" items={ob.dailyExperience} borderClass="blue-border" />
              </div>
            </div>
          )}

          <hr className="divider" />
          <button className="add-stone-btn" onClick={onReset} style={{ marginTop: 0 }}>
            Start a new map
          </button>
        </div>
      );
    }

    function App() {
      const saved = loadSaved();

      const [offerPromise, setOfferPromise] = useState(saved?.offerPromise || '');
      const [thisBank, setThisBank] = useState(saved?.thisBank || '');
      const [otherBank, setOtherBank] = useState(saved?.otherBank || '');
      const [stones, setStones] = useState(saved?.stones || ['', '', '', '', '']);
      const [loading, setLoading] = useState(false);
      const [results, setResults] = useState(null);
      const [error, setError] = useState(null);
      const [validationError, setValidationError] = useState(null);
      const resultsRef = useRef(null);

      useEffect(() => {
        saveToDisk({ offerPromise, thisBank, otherBank, stones });
      }, [offerPromise, thisBank, otherBank, stones]);

      const filledStones = stones.filter(s => s.trim());
      const canSubmit = offerPromise.trim() && thisBank.trim() && otherBank.trim() && filledStones.length >= 3;

      const addStone = () => setStones(prev => [...prev, '']);

      const updateStone = (i, val) => {
        setStones(prev => {
          const next = [...prev];
          next[i] = val;
          return next;
        });
      };

      const removeStone = (i) => {
        setStones(prev => prev.filter((_, idx) => idx !== i));
      };

      const handleSubmit = async () => {
        setValidationError(null);

        if (!offerPromise.trim()) {
          setValidationError('Your offer promise is missing. What do people walk away with?');
          return;
        }
        if (!thisBank.trim()) {
          setValidationError('This bank needs filling in. Where is your cold person standing right now?');
          return;
        }
        if (!otherBank.trim()) {
          setValidationError('The other bank needs filling in. Where do they land after working with you?');
          return;
        }
        if (filledStones.length < 3) {
          setValidationError('You need at least three stepping stones to cross any river. Add a few more.');
          return;
        }

        setLoading(true);
        setError(null);
        setResults(null);

        try {
          const response = await fetch('/api/analyse', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              offerPromise: offerPromise.trim(),
              thisBank: thisBank.trim(),
              otherBank: otherBank.trim(),
              stones: filledStones,
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            setError(data.error || 'Something went wrong. Please try again.');
            return;
          }

          setResults(data);
          setTimeout(() => {
            resultsRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 100);
        } catch (err) {
          setError('Couldn\'t reach the analysis service. Check your connection and try again.');
        } finally {
          setLoading(false);
        }
      };

      const handleReset = () => {
        setResults(null);
        setError(null);
        setValidationError(null);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      return (
        <>
          <header className="site-header">
            <h1>The River Map</h1>
            <p>Map the belief journey your cold prospect needs to take — then find out if it actually holds water.</p>
          </header>

          <main className="main">
            {/* Section 1 */}
            <div className="section-block">
              <div className="section-number">Section 01</div>
              <div className="section-label">The offer promise</div>
              <textarea
                rows={4}
                value={offerPromise}
                onChange={e => setOfferPromise(e.target.value)}
                placeholder="Who is this for, what do they walk away with, and what specifically changes — in 2 sentences or less. Be concrete. Avoid lofty language."
              />
            </div>

            {/* Section 2 */}
            <div className="section-block">
              <div className="section-number">Section 02</div>
              <div className="section-label">The current river bank — your cold connection right now</div>
              <div className="embedded-prompts">
                <p>What do they believe about their problem and about themselves?</p>
                <p>How do they see themselves? What does their daily experience actually look like?</p>
                <p>What are they quietly afraid is true? What have they tried that hasn't worked?</p>
              </div>
              <textarea
                rows={8}
                value={thisBank}
                onChange={e => setThisBank(e.target.value)}
                placeholder="Write what's true for them right now..."
              />
              <p className="field-instruction">Be specific. Name the belief, the fear, the Monday morning feeling. Avoid vague or aspirational language — stay on this bank.</p>
            </div>

            {/* Section 3 */}
            <div className="section-block">
              <div className="section-number">Section 03</div>
              <div className="section-label">The other river bank — where they are after working with you</div>
              <div className="embedded-prompts">
                <p>What do they now believe? How do they see themselves differently?</p>
                <p>What do they have that they didn't have before?</p>
                <p>What does a specific moment in their day or week look like now?</p>
              </div>
              <textarea
                rows={8}
                value={otherBank}
                onChange={e => setOtherBank(e.target.value)}
                placeholder="Write what's true for them after working with you..."
              />
              <p className="field-instruction">Ground this in the direct result of your offer — not a 3 year life vision. What is specifically true for them after working with you?</p>
            </div>

            {/* Section 4 */}
            <div className="section-block">
              <div className="section-number">Section 04</div>
              <div className="section-label">The stepping stones — the belief journey</div>
              <p style={{ fontSize: '0.875rem', color: 'var(--moss)', marginBottom: '20px', fontStyle: 'italic' }}>
                Each stone is a belief your cold person needs in place before the next one is available to them. Start with the first shift a cold person could make. End with the belief that makes saying yes feel inevitable.
              </p>
              <div className="stones-list">
                {stones.map((stone, i) => (
                  <div key={i} className="stone-row">
                    <span className="stone-number">{i + 1}</span>
                    <input
                      type="text"
                      value={stone}
                      onChange={e => updateStone(i, e.target.value)}
                      placeholder="e.g. Something needs to change — the low-grade dread isn't just a bad patch, this is structural."
                    />
                    {stones.length > 3 && (
                      <button className="remove-stone-btn" onClick={() => removeStone(i)} title="Remove stone">×</button>
                    )}
                  </div>
                ))}
              </div>
              <button className="add-stone-btn" onClick={addStone}>
                + Add another stone
              </button>
            </div>

            {/* Validation error */}
            {validationError && (
              <div className="inline-error">{validationError}</div>
            )}

            {/* Submit */}
            <button
              className="analyse-btn"
              onClick={handleSubmit}
              disabled={loading}
            >
              {loading ? 'Reading your map…' : 'Review my river map'}
            </button>

            {/* Loading */}
            {loading && (
              <div className="loading-state" style={{ marginTop: '32px' }}>
                <div className="spinner"></div>
                <h3>Reading your map</h3>
                <p>This usually takes 10–20 seconds. Sit tight.</p>
              </div>
            )}

            {/* Error */}
            {error && !loading && (
              <div className="error-card">
                <p>{error}</p>
                <button className="retry-btn" onClick={handleSubmit}>Try again</button>
              </div>
            )}

            {/* Results */}
            <div ref={resultsRef}>
              {results && <Results data={results} onReset={handleReset} />}
            </div>
          </main>

          <footer className="site-footer">
            <a href="https://jessmiller.co">jessmiller.co</a>
          </footer>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
