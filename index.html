<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The River Crossing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bone: #EBE0D1;
      --surface: #FDFAF7;
      --olive: #323D27;
      --cosmos: #461420;
      --moss: #7D774F;
      --white: #FFFFFF;
      --border: #D2C8BB;
      --gold: #DAAD44;
      --coral: #E87580;
      --blue: #7293C5;
      --champagne: #E6C3AC;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bone);
      color: var(--olive);
      min-height: 100vh;
      font-size: 18px;
      line-height: 1.6;
    }

    h1, h2, h3, h4 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      line-height: 1.2;
    }

    /* ── Header ── */
    .site-header {
      background: var(--olive);
      padding: 4rem 3rem;
      text-align: center;
    }

    .site-header .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--moss);
      margin-bottom: 1.25rem;
    }

    .site-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 54px;
      font-weight: 300;
      color: var(--bone);
      line-height: 1.1;
      margin-bottom: 0;
    }

    .site-header h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .header-divider {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 2rem auto;
    }

    .site-header .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      font-style: italic;
      color: var(--champagne);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* ── Layout ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Offer promise card (dark) ── */
    .offer-card {
      background: var(--olive);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 28px;
    }

    .offer-card .card-eyebrow {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--moss);
      margin-bottom: 0.5rem;
    }

    .offer-card .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      font-weight: 400;
      color: var(--bone);
      margin-bottom: 0.875rem;
    }

    .offer-card textarea {
      background: rgba(235,224,209,0.08);
      border: 0.5px solid rgba(235,224,209,0.2);
      color: var(--bone);
      border-radius: 8px;
      padding: 0.75rem 0.875rem;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      line-height: 1.7;
      width: 100%;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    .offer-card textarea::placeholder {
      color: rgba(235,224,209,0.3);
      font-style: italic;
    }

    .offer-card textarea:focus {
      border-color: var(--gold);
    }

    /* ── Three-column river layout ── */
    .river-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
      align-items: start;
    }

    @media (max-width: 760px) {
      .river-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Bank cards (light) ── */
    .bank-card {
      background: var(--surface);
      border-radius: 12px;
      border: 0.5px solid var(--border);
      padding: 1.25rem;
    }

    .bank-card .card-eyebrow {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .bank-card.this-bank .card-eyebrow { color: var(--cosmos); }
    .bank-card.other-bank .card-eyebrow { color: var(--blue); }

    .bank-card .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      font-weight: 500;
      margin-bottom: 0.875rem;
    }

    .bank-card.this-bank .card-title { color: var(--cosmos); }
    .bank-card.other-bank .card-title { color: var(--blue); }

    .bank-prompts {
      list-style: none;
      padding: 0;
      margin: 0 0 0.875rem 0;
      border-left: 2px solid var(--champagne);
      padding-left: 0.75rem;
    }

    .bank-prompts li {
      font-size: 15px;
      color: var(--moss);
      line-height: 1.6;
      margin-bottom: 4px;
    }

    .bank-prompts li:last-child { margin-bottom: 0; }

    .bank-card textarea {
      width: 100%;
      min-height: 200px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--olive);
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 0.875rem;
      resize: vertical;
      outline: none;
      line-height: 1.7;
      transition: border-color 0.15s;
    }

    .bank-card textarea:focus { border-color: var(--moss); }
    .bank-card textarea::placeholder { color: #C4B8A8; font-style: italic; }

    /* ── Stones column ── */
    .stones-card {
      background: var(--white);
      border: 0.5px solid var(--blue);
      border-radius: 12px;
      padding: 1rem;
    }

    .stones-card .card-eyebrow {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 0.5rem;
    }

    .stones-card .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      font-weight: 500;
      color: var(--blue);
      margin-bottom: 0.75rem;
    }

    .stones-prompt {
      font-size: 15px;
      color: var(--moss);
      border-left: 2px solid var(--champagne);
      padding-left: 0.75rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .stones-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stone-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .stone-dot {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid var(--blue);
      background: var(--bone);
      color: var(--blue);
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
    }

    .stone-row textarea {
      flex: 1;
      background: var(--bone);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--olive);
      padding: 0.5rem 0.625rem;
      resize: vertical;
      outline: none;
      min-height: 48px;
      line-height: 1.6;
      transition: border-color 0.15s;
      width: 100%;
    }

    .stone-row textarea:focus { border-color: var(--moss); }
    .stone-row textarea::placeholder { color: #C4B8A8; font-style: italic; }

    .remove-stone-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--border);
      font-size: 1rem;
      padding: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
      line-height: 1;
      margin-top: 6px;
    }

    .remove-stone-btn:hover { color: var(--coral); }

    .add-stone-btn {
      background: none;
      border: 0.5px dashed var(--blue);
      border-radius: 6px;
      color: var(--blue);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      cursor: pointer;
      padding: 8px 12px;
      margin-top: 10px;
      transition: all 0.15s;
      width: 100%;
    }

    .add-stone-btn:hover {
      background: rgba(114,147,197,0.06);
    }

    /* ── Submit button ── */
    .analyse-btn {
      display: block;
      width: 100%;
      background: var(--olive);
      color: var(--bone);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.02em;
      border: none;
      border-radius: 10px;
      padding: 0.875rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .analyse-btn:hover:not(:disabled) {
      background: var(--cosmos);
    }

    .analyse-btn:disabled {
      background: var(--border);
      color: var(--moss);
      cursor: not-allowed;
    }

    /* ── Validation / error ── */
    .inline-error {
      background: rgba(232,117,128,0.1);
      border: 1px solid rgba(232,117,128,0.3);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 15px;
      color: var(--cosmos);
      margin-top: 16px;
    }

    .error-card {
      background: rgba(232,117,128,0.08);
      border: 0.5px solid rgba(232,117,128,0.25);
      border-radius: 8px;
      padding: 28px 32px;
      text-align: center;
      margin-top: 32px;
    }

    .error-card p {
      color: var(--cosmos);
      margin-bottom: 8px;
      font-size: 16px;
    }

    .retry-btn {
      background: none;
      border: 0.5px solid var(--border);
      border-radius: 6px;
      color: var(--moss);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      cursor: pointer;
      padding: 8px 18px;
      margin-top: 10px;
      transition: all 0.15s;
    }

    .retry-btn:hover {
      border-color: var(--cosmos);
      color: var(--cosmos);
    }

    /* ── Loading ── */
    .loading-state {
      text-align: center;
      padding: 64px 24px;
    }

    .loading-state .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--olive);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      color: var(--cosmos);
      margin-bottom: 8px;
    }

    .loading-state p {
      color: var(--moss);
      font-size: 15px;
      font-style: italic;
    }

    /* ── Results ── */
    .results {
      margin-top: 48px;
    }

    .results-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      color: var(--cosmos);
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .result-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 24px 28px;
      margin-bottom: 16px;
    }

    .result-card.overall {
      border-left: 4px solid var(--cosmos);
    }

    .result-card-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--moss);
      margin-bottom: 10px;
    }

    .result-card h3 {
      font-size: 1.2rem;
      color: var(--cosmos);
      margin-bottom: 10px;
    }

    .result-card p {
      font-size: 16px;
      color: var(--olive);
      line-height: 1.7;
    }

    .feedback-text {
      font-size: 16px;
      color: var(--olive);
      margin-bottom: 12px;
      line-height: 1.7;
    }

    .expert-traps-card {
      border-left: 4px solid var(--coral);
    }

    .expert-trap-item {
      background: rgba(232,117,128,0.08);
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 15px;
      color: var(--olive);
      line-height: 1.6;
    }

    .expert-trap-item:last-child { margin-bottom: 0; }

    .no-expert-traps {
      background: rgba(125,119,79,0.1);
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 15px;
      color: var(--moss);
    }

    /* ── Suggested river map (results) ── */
    .river-map-doc { margin-bottom: 20px; }

    .river-map-doc-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      color: var(--cosmos);
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .offer-promise-block {
      background: var(--olive);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 16px;
    }

    .offer-promise-block .result-card-label {
      color: rgba(235,224,209,0.5);
    }

    .offer-promise-block p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      color: var(--bone);
      line-height: 1.6;
      font-weight: 400;
    }

    /* Two-column banks in results */
    .results-banks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media (max-width: 600px) {
      .results-banks-grid { grid-template-columns: 1fr; }
    }

    .result-bank-card {
      background: var(--surface);
      border-radius: 12px;
      border: 0.5px solid var(--border);
      padding: 1.25rem;
    }

    .result-bank-card.cosmos-bank { border-top: 3px solid var(--cosmos); }
    .result-bank-card.blue-bank { border-top: 3px solid var(--blue); }

    .result-bank-card .card-eyebrow {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .result-bank-card.cosmos-bank .card-eyebrow { color: var(--cosmos); }
    .result-bank-card.blue-bank .card-eyebrow { color: var(--blue); }

    .result-bank-card .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .result-bank-card.cosmos-bank .card-title { color: var(--cosmos); }
    .result-bank-card.blue-bank .card-title { color: var(--blue); }

    .subsection-card {
      background: rgba(235,224,209,0.35);
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .subsection-card:last-child { margin-bottom: 0; }

    .subsection-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--moss);
      margin-bottom: 6px;
    }

    .subsection-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .subsection-list li {
      font-size: 15px;
      color: var(--olive);
      line-height: 1.7;
      padding: 3px 0;
      border-bottom: 0.5px solid rgba(210,200,187,0.5);
    }

    .subsection-list li:last-child { border-bottom: none; }

    .core-problem-text {
      font-size: 15px;
      color: var(--olive);
      line-height: 1.7;
      font-style: italic;
    }

    /* Stones results */
    .stones-result-card {
      background: var(--white);
      border: 0.5px solid var(--blue);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 16px;
    }

    .stones-result-card .card-eyebrow {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 0.4rem;
    }

    .stones-result-card .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      font-weight: 500;
      color: var(--blue);
      margin-bottom: 1rem;
    }

    .stones-result-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .stone-result-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 0.5px solid rgba(210,200,187,0.5);
    }

    .stone-result-row:last-child { border-bottom: none; }

    .stone-result-dot {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid var(--blue);
      background: var(--bone);
      color: var(--blue);
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .stone-result-content { flex: 1; }

    .stone-result-belief {
      font-size: 15px;
      color: var(--olive);
      line-height: 1.65;
    }

    .stone-result-note {
      font-size: 14px;
      color: var(--moss);
      line-height: 1.5;
      margin-top: 3px;
      font-style: italic;
    }

    /* ── Misc ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }

    .reset-btn {
      background: none;
      border: 0.5px dashed var(--border);
      border-radius: 6px;
      color: var(--moss);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      cursor: pointer;
      padding: 10px 20px;
      transition: all 0.15s;
      width: 100%;
    }

    .reset-btn:hover {
      border-color: var(--moss);
      background: rgba(125,119,79,0.05);
    }

    .site-footer {
      text-align: center;
      padding: 28px 24px;
      border-top: 1px solid var(--border);
      font-size: 16px;
      color: var(--moss);
    }

    .site-footer a {
      color: var(--moss);
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .site-header { padding: 3rem 1.5rem; }
      .site-header h1 { font-size: 40px; }
      .result-card { padding: 16px 18px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STORAGE_KEY = 'rivermap_v1';

    function loadSaved() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch {}
      return null;
    }

    function saveToDisk(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch {}
    }

    function SubsectionCard({ label, items, borderClass }) {
      if (!items || items.length === 0) return null;
      return (
        <div className={`subsection-card ${borderClass}`}>
          <div className="subsection-label">{label}</div>
          <ul className="subsection-list">
            {items.map((item, i) => <li key={i}>{item}</li>)}
          </ul>
        </div>
      );
    }

    function Results({ data, onReset }) {
      const map = data.suggestedRiverMap || {};
      const tb = map.thisBank || {};
      const ob = map.otherBank || {};

      return (
        <div className="results">
          <h2 className="results-heading">Your river map — analysed and rewritten</h2>

          <div className="result-card overall">
            <div className="result-card-label">Overall read</div>
            <p>{data.overallRead}</p>
          </div>

          <div className="result-card expert-traps-card">
            <div className="result-card-label">Expert trap flags</div>
            <h3>Are you speaking from the other bank?</h3>
            {data.expertTrapFlags && data.expertTrapFlags.length > 0 ? (
              data.expertTrapFlags.map((flag, i) => (
                <div key={i} className="expert-trap-item">
                  <strong style={{ display: 'block', marginBottom: '4px' }}>{flag.phrase}</strong>
                  {flag.why}
                </div>
              ))
            ) : (
              <div className="no-expert-traps">No expert traps detected — your language stays on this bank throughout.</div>
            )}
          </div>

          {map.offerPromise && (
            <div className="river-map-doc">
              <h3 className="river-map-doc-heading">Your rewritten river map</h3>

              {/* Offer promise */}
              <div className="offer-promise-block">
                <div className="result-card-label">Offer promise</div>
                <p>{map.offerPromise}</p>
              </div>

              {/* Two-column banks */}
              <div className="results-banks-grid">
                <div className="result-bank-card cosmos-bank">
                  <div className="card-eyebrow">The current bank</div>
                  <div className="card-title">Your cold connection, right now</div>
                  <SubsectionCard label="What they believe" items={tb.beliefs} borderClass="" />
                  <SubsectionCard label="How they see themselves" items={tb.selfImage} borderClass="" />
                  {tb.coreProblem && (
                    <div className="subsection-card">
                      <div className="subsection-label">Their core problem</div>
                      <p className="core-problem-text">{tb.coreProblem}</p>
                    </div>
                  )}
                  <SubsectionCard label="How this shows up in their day" items={tb.dailyExperience} borderClass="" />
                </div>

                <div className="result-bank-card blue-bank">
                  <div className="card-eyebrow">The other bank</div>
                  <div className="card-title">After working with you</div>
                  <SubsectionCard label="What they now believe" items={ob.beliefs} borderClass="" />
                  <SubsectionCard label="How they now see themselves" items={ob.selfImage} borderClass="" />
                  <SubsectionCard label="What they have that they didn't have before" items={ob.whatTheyHave} borderClass="" />
                  <SubsectionCard label="What looks different in their day" items={ob.dailyExperience} borderClass="" />
                </div>
              </div>

              {/* Stepping stones */}
              {map.steppingStones && map.steppingStones.length > 0 && (
                <div className="stones-result-card">
                  <div className="card-eyebrow">The belief journey</div>
                  <div className="card-title">Stepping stones</div>
                  <div className="stones-result-list">
                    {map.steppingStones.map((stone, i) => (
                      <div key={i} className="stone-result-row">
                        <span className="stone-result-dot">{stone.num || i + 1}</span>
                        <div className="stone-result-content">
                          <div className="stone-result-belief">{stone.belief}</div>
                          {stone.note && <div className="stone-result-note">{stone.note}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          <hr className="divider" />
          <button className="reset-btn" onClick={onReset}>
            Start a new map
          </button>
        </div>
      );
    }

    function App() {
      const saved = loadSaved();

      const [offerPromise, setOfferPromise] = useState(saved?.offerPromise || '');
      const [thisBank, setThisBank] = useState(saved?.thisBank || '');
      const [otherBank, setOtherBank] = useState(saved?.otherBank || '');
      const [stones, setStones] = useState(saved?.stones || ['', '', '', '', '']);
      const [loading, setLoading] = useState(false);
      const [results, setResults] = useState(null);
      const [error, setError] = useState(null);
      const [validationError, setValidationError] = useState(null);
      const resultsRef = useRef(null);

      useEffect(() => {
        saveToDisk({ offerPromise, thisBank, otherBank, stones });
      }, [offerPromise, thisBank, otherBank, stones]);

      const filledStones = stones.filter(s => s.trim());

      const addStone = () => setStones(prev => [...prev, '']);

      const updateStone = (i, val) => {
        setStones(prev => {
          const next = [...prev];
          next[i] = val;
          return next;
        });
      };

      const removeStone = (i) => {
        setStones(prev => prev.filter((_, idx) => idx !== i));
      };

      const handleSubmit = async () => {
        setValidationError(null);

        if (!offerPromise.trim()) {
          setValidationError('Your offer promise is missing. What do people walk away with?');
          return;
        }
        if (!thisBank.trim()) {
          setValidationError('This bank needs filling in. Where is your cold person standing right now?');
          return;
        }
        if (!otherBank.trim()) {
          setValidationError('The other bank needs filling in. Where do they land after working with you?');
          return;
        }
        if (filledStones.length < 3) {
          setValidationError('You need at least three stepping stones to cross any river. Add a few more.');
          return;
        }

        setLoading(true);
        setError(null);
        setResults(null);

        try {
          const response = await fetch('/api/analyse', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              offerPromise: offerPromise.trim(),
              thisBank: thisBank.trim(),
              otherBank: otherBank.trim(),
              stones: filledStones,
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            setError(data.error || 'Something went wrong. Please try again.');
            return;
          }

          setResults(data);
          setTimeout(() => {
            resultsRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 100);
        } catch (err) {
          setError('Couldn\'t reach the analysis service. Check your connection and try again.');
        } finally {
          setLoading(false);
        }
      };

      const handleReset = () => {
        setResults(null);
        setError(null);
        setValidationError(null);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      return (
        <>
          <header className="site-header">
            <div className="eyebrow">Regenerative Revenue — Retreat Tool</div>
            <h1>The River <em>Crossing</em></h1>
            <div className="header-divider"></div>
            <p className="subtitle">Map the belief journey your cold connection needs to take — from where they are right now, to becoming a client.</p>
          </header>

          <main className="main">

            {/* Offer promise */}
            <div className="offer-card">
              <div className="card-eyebrow">The offer promise</div>
              <div className="card-title">What do you deliver — and for whom?</div>
              <textarea
                rows={4}
                value={offerPromise}
                onChange={e => setOfferPromise(e.target.value)}
                placeholder="Who is this for, what do they walk away with, and what specifically changes — in 2 sentences or less."
              />
            </div>

            {/* Three-column river */}
            <div className="river-grid">

              {/* This bank */}
              <div className="bank-card this-bank">
                <div className="card-eyebrow">The current bank</div>
                <div className="card-title">Your cold connection, right now</div>
                <ul className="bank-prompts">
                  <li>— What do they believe?</li>
                  <li>— How do they see themselves?</li>
                  <li>— What is their core problem?</li>
                  <li>— How does this show up in their daily experience?</li>
                </ul>
                <textarea
                  value={thisBank}
                  onChange={e => setThisBank(e.target.value)}
                  placeholder="Write what's true for them right now..."
                />
              </div>

              {/* Stepping stones */}
              <div className="stones-card">
                <div className="card-eyebrow">The belief journey</div>
                <div className="card-title">Stepping stones</div>
                <p className="stones-prompt">What does your person need to believe to move from one side to the other?</p>
                <div className="stones-list">
                  {stones.map((stone, i) => (
                    <div key={i} className="stone-row">
                      <span className="stone-dot">{i + 1}</span>
                      <textarea
                        value={stone}
                        onChange={e => updateStone(i, e.target.value)}
                        placeholder="A belief shift…"
                        rows={2}
                      />
                      {stones.length > 3 && (
                        <button className="remove-stone-btn" onClick={() => removeStone(i)} title="Remove">×</button>
                      )}
                    </div>
                  ))}
                </div>
                <button className="add-stone-btn" onClick={addStone}>
                  + Add stone
                </button>
              </div>

              {/* Other bank */}
              <div className="bank-card other-bank">
                <div className="card-eyebrow">The other bank</div>
                <div className="card-title">After working with you</div>
                <ul className="bank-prompts">
                  <li>— What do they believe?</li>
                  <li>— How do they see themselves?</li>
                  <li>— What do they have now?</li>
                  <li>— What looks different in their daily experience?</li>
                </ul>
                <textarea
                  value={otherBank}
                  onChange={e => setOtherBank(e.target.value)}
                  placeholder="Write what's true for them after working with you..."
                />
              </div>

            </div>

            {/* Validation error */}
            {validationError && (
              <div className="inline-error">{validationError}</div>
            )}

            {/* Submit */}
            <button
              className="analyse-btn"
              onClick={handleSubmit}
              disabled={loading}
            >
              {loading ? 'Reading your map…' : 'Review my river map'}
            </button>

            {/* Loading */}
            {loading && (
              <div className="loading-state" style={{ marginTop: '32px' }}>
                <div className="spinner"></div>
                <h3>Reading your map</h3>
                <p>This usually takes 10–20 seconds. Sit tight.</p>
              </div>
            )}

            {/* Error */}
            {error && !loading && (
              <div className="error-card">
                <p>{error}</p>
                <button className="retry-btn" onClick={handleSubmit}>Try again</button>
              </div>
            )}

            {/* Results */}
            <div ref={resultsRef}>
              {results && <Results data={results} onReset={handleReset} />}
            </div>
          </main>

          <footer className="site-footer">
            <a href="https://jessmiller.co">jessmiller.co</a>
          </footer>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
